name: Code Coverage

# Generates and publishes the code coverage report to codecov.io
# Uses cargo-llvm-cov for precise LLVM-based coverage

on:
  push:
    branches:
      - master
      - 'feature/**'      # all feature/* branches
  pull_request:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # ── Run 1 : default features ──────────────────────────────────────────
      # Active for all versions. Covers the 11 core modules:
      # error, config, context, executor, registry, parser,
      # validator, interface, builder, utils, prelude.
      # v0.2.0+ also covers: help
      - name: Generate code coverage — default features
        run: |
          cargo llvm-cov --all-targets --workspace \
            --lcov --output-path lcov-default.info

      # ── Run 2 : all features ──────────────────────────────────────────────
      # Activate at v0.5.0 when Cargo.toml declares optional features.
      # Replace lcov-default.info with lcov-all.info in the upload step below.
      #
      # - name: Generate code coverage — all features
      #   run: |
      #     cargo llvm-cov --all-targets --all-features --workspace \
      #       --lcov --output-path lcov-all.info

      # ── Run 3 : async feature ─────────────────────────────────────────────
      # Activate at v0.5.0 when Cargo.toml declares: [features] async = [...]
      #
      # - name: Generate code coverage — async feature
      #   run: |
      #     cargo llvm-cov --all-targets --features async --workspace \
      #       --lcov --output-path lcov-async.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov-default.info
          fail_ci_if_error: false
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: lcov-default.info
          retention-days: 30

      - name: Display coverage summary
        run: |
          echo "📊 Coverage Report Generated"
          echo "Branch: ${{ github.ref_name }}"
          echo "View detailed report at: https://codecov.io/gh/${{ github.repository }}"
