name: "🐛 Bug"
description: >
  Report an incorrect behaviour, a panic, or an unexpected result
  in dynamic-cli.
title: "[BUG] "
labels:
  - "type: bug"
  - "status: triage"
  - "priority: high"

body:
  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "One sentence: what happens vs what should happen."
      placeholder: >
        When calling `CliBuilder::build()` with an empty YAML config,
        the program panics instead of returning `Err`.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behaviour"
      placeholder: >
        Return `Err(DynamicCliError::ConfigError(…))` with an explicit message.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Observed behaviour"
      placeholder: |
        ```
        thread 'main' panicked at 'called `Option::unwrap()` on a `None` value',
        src/config/mod.rs:42:10
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: "Reproduction steps"
      description: >
        Minimal Rust code reproducing the issue (MCVE).
        A failing unit test is ideal.
      placeholder: |
        ```rust
        use dynamic_cli::prelude::*;

        #[test]
        fn repro_empty_config() {
            let result = CliBuilder::new()
                .config_file("non_existent.yaml")
                .build();
            assert!(result.is_err()); // panics here instead of returning Err
        }
        ```
      render: markdown
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: "Rust version"
      description: "Output of `rustc --version`."
      placeholder: "rustc 1.85.0 (4d91de4e4 2025-02-17)"
    validations:
      required: true

  - type: input
    id: dcli-version
    attributes:
      label: "dynamic-cli version"
      placeholder: "0.1.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Operating system"
      options:
        - "Linux"
        - "macOS"
        - "Windows"
        - "Other"
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: "Affected module(s)"
      description: "Apply the matching `scope:` labels manually after creation."
      options:
        - label: "`api` — public interface & prelude"
        - label: "`cli` — parser, interface, builder"
        - label: "`docs` — rustdoc, examples"
        - label: "`tests` — coverage"
        - label: "`ci` — pipeline"

  - type: dropdown
    id: priority
    attributes:
      label: "Severity"
      description: "`priority: high` is applied by default. Adjust if needed."
      options:
        - "high — panic, data corruption, public regression"
        - "medium — incorrect behaviour, workaround available"
        - "low — cosmetic, imprecise error message"
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: "Estimated fix effort"
      description: "Apply the matching `effort:` label after creation."
      options:
        - "XS — typo, missing guard clause"
        - "S  — localised fix (1 module)"
        - "M  — multi-module fix"
        - "L  — refactoring required"
        - "XL — architectural impact"
    validations:
      required: false

  - type: dropdown
    id: breaking-fix
    attributes:
      label: "Is the fix a breaking change?"
      description: "If yes, also add `type: breaking`."
      options:
        - "No — transparent fix"
        - "Yes — API change required"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: "Additional context"
      description: "Full logs, backtrace, YAML config used, etc."
    validations:
      required: false
